<body>
    <header class="banner">
        <div class="header-content">
            <a href="index.php" class="brand">
                <img src="imagenes/logo.png" alt="Minimarket V&V logo">
            </a>
            <nav class="nav-links">
                <a href="index.php">Inicio</a>
                <div class="dropdown">
                    <button class="dropdown-toggle" aria-haspopup="true" aria-expanded="false">Productos ▾</button>
                    <div class="dropdown-menu">

                    </div>
                </div>

            </nav>
            <div class="header-actions">
                <a href="login.html" class="btn account">Mi cuenta</a>
            </div>
        </div>
    </header>
    <main>
        <section class="bottom-section auth-card">
            <h1>Iniciar sesión</h1>
            <form class="auth-form" id="login-form" action="login.php" method="post">
                <label for="email">Correo electrónico</label>
                <input id="email" name="email" type="email" placeholder="correo@ejemplo.com" required>
                <label for="password">Contraseña</label>
                <input id="password" name="password" type="password" placeholder="••••••••" required>
                <button type="submit" class="btn primary">Ingresar</button>
            </form>
            <p class="auth-link">¿No tienes cuenta? <a href="register.html">Regístrate</a></p>
        </section>
    </main>
    <script>
        const loginForm = document.getElementById('login-form');
        loginForm.addEventListener('submit', function(event) {
            event.preventDefault();
            const formData = new FormData(loginForm);

            fetch(loginForm.action, {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    window.location.href = data.redirect || 'index.html';
                } else {
                    alert(data.message || 'Correo o contraseña incorrectos.');
                }
            })
            .catch(() => {
                alert('No se pudo conectar con el servidor.');
            });
        });
    </script>
</body>
</html>
