                <img src="imagenes/logo.png" alt="Minimarket V&V logo">
            </a>
            <nav class="nav-links">
                <a href="index.php">Inicio</a>
                <div class="dropdown">
                    <button class="dropdown-toggle" aria-haspopup="true" aria-expanded="false">Productos ▾</button>

            </nav>
            <div class="header-actions">
                <a href="login.html" class="btn account">Mi cuenta</a>
            </div>
        </div>
    </header>
    <main>
        <section class="bottom-section" style="max-width: 500px; margin: 2rem auto; text-align: left;">
            <h1>Crear cuenta</h1>
            <form class="auth-form" id="register-form" action="register.php" method="post">
                <label for="name">Nombre</label>
                <input id="name" name="nombre" type="text" placeholder="Tu nombre" required>
                <label for="email">Correo electronico</label>
                <input id="email" name="email" type="email" placeholder="correo@ejemplo.com" required>
                <label for="password">Contraseña</label>
                <input id="password" name="password" type="password" placeholder="••••••••" required>
                <button type="submit" class="btn primary" style="width: 100%;">Registrarse</button>
            </form>
            <p style="margin-top: 1rem;">¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a></p>
        </section>
    </main>
    <script>
        const registerForm = document.getElementById('register-form');
        registerForm.addEventListener('submit', function(event) {
            event.preventDefault();
            const formData = new FormData(registerForm);

            fetch(registerForm.action, {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    alert(data.message);
                    window.location.href = 'login.html';
                } else {
                    alert(data.message || 'Error en el registro.');
                }
            })
            .catch(() => {
                alert('No se pudo conectar con el servidor.');
            });
        });
    </script>
</body>
