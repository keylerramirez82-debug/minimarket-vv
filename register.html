<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Minimarket V&V</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="banner">
        <div class="header-content">
            <a href="index.html" class="brand">
                <img src="imagenes/logo.png" alt="Minimarket V&V logo">
            </a>
            <nav class="nav-links">
                <a href="index.html">Inicio</a>
                <div class="dropdown">
                    <button class="dropdown-toggle" aria-haspopup="true" aria-expanded="false">Productos ▾</button>
                    <div class="dropdown-menu">
                        <a href="productos_de_limpieza.html">Limpieza</a>
                        <a href="snack.html">Snacks</a>
                        <a href="frutas.html">Frutas</a>
                        <a href="bebidas.html">Bebidas</a>
                        <a href="alimentos.html">Alimentos</a>
                        <a href="bebidas_alcoholicas.html">Bebidas Alcohólicas</a>
                    </div>
                </div>
                <a href="opiniones.html">Opiniones</a>
                <a href="Delivery.html">Delivery</a>
            </nav>
            <div class="header-actions">
                <a href="login.html" class="btn account">Mi cuenta</a>
            </div>
        </div>
    </header>
    <main>
        <section class="bottom-section" style="max-width: 500px; margin: 2rem auto; text-align: left;">
            <h1>Crear cuenta</h1>
            <form class="auth-form">
                <label for="name">Nombre</label>
                <input id="name" type="text" placeholder="Tu nombre" required>
                <label for="email">Correo electronico</label>
                <input id="email" type="email" placeholder="correo@ejemplo.com" required>
                <label for="password">Contraseña</label>
                <input id="password" type="password" placeholder="••••••••" required>
                <button type="submit" class="btn primary" style="width: 100%;">Registrarse</button>
            </form>
            <p style="margin-top: 1rem;">¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a></p>
        </section>
    </main>
</body>
</html>
